<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APP.2024-10-24.ZIP</title>
    <style>
        :root {
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --primary: #4f46e5;
            --text-main: #111827;
            --text-sub: #6b7280;
            --border: #f1f5f9;
            --win: #0078d4; --mac: #1a1a1a; --lin: #f59e0b; --and: #10b981; --ios: #1a1a1a;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
        }

        .header {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            width: 100%;
            padding: 10px 15px;
        }

        .header-inner {
            max-width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap; 
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            min-width: 0;
        }

        .logo-text { 
            font-size: 1.1rem; 
            font-weight: 800; color: var(--primary);
            letter-spacing: -0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
            flex-shrink: 1;
        }

        .controls {
            display: flex;
            gap: 8px;
            flex: 1 1 auto;
            min-width: 0;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        #search-input, #platform-filter {
            height: 38px;
            padding: 0 10px;
            background: #f3f4f6; border: 1px solid transparent;
            border-radius: 8px; outline: none;
            font-size: 0.9rem; transition: all 0.2s ease;
            width: 100%;
            min-width: 0;
        }

        #platform-filter {
            flex: 1 1 120px;
            max-width: 250px;
            cursor: pointer;
            color: var(--text-main);
        }

        #search-input {
            flex: 2 1 150px;
            max-width: 400px;
        }

        #search-input:focus, #platform-filter:focus { 
            background: #fff; border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.08);
        }

        .container { 
            max-width: 1600px; margin: 0 auto; 
            padding: 10px; 
        }
        
        .grid {
            column-count: auto;
            column-width: 280px;
            column-gap: 15px;
            width: 100%;
        }

        .card {
            break-inside: avoid;
            margin-bottom: 15px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.03);
            display: flex; flex-direction: column;
            width: 100%;
            min-width: 0;
            height: fit-content;
            position: relative;
        }

        .card:hover { 
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); 
        }

        .card-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
            width: 100%;
            text-align: center;
        }

        .source-container {
            position: absolute;
            bottom: 12px;
            left: 12px;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .source-link {
            text-decoration: none;
            color: var(--text-main);
            opacity: 0.4;
            transition: all 0.2s;
            display: flex;
            align-items: center;
        }

        .source-link:hover { 
            opacity: 1; 
            color: var(--primary);
        }

        .img-wrapper {
            width: 56px; 
            height: 56px;
            flex-shrink: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #f9fafb;
            border: 1px solid var(--border);
        }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; }

        .name { 
            font-size: 1.05rem; font-weight: 700; 
            margin: 0; 
            word-break: break-all;
            width: 100%;
        }

        .desc-box {
            font-size: 0.85rem; color: var(--text-sub);
            line-height: 1.5; margin-bottom: 15px;
            word-wrap: break-word;
            text-align: center;
            cursor: pointer;
            user-select: none;
        }

        .platforms { 
            border-top: 1px solid var(--border); 
            padding-top: 12px; 
            margin-top: auto;
            padding-bottom: 24px;
        }
        .p-row { margin-bottom: 16px; width: 100%; }
        
        .p-header { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            align-items: center; 
            margin-bottom: 8px; 
            gap: 8px; 
        }

        .p-badge { font-size: 0.6rem; font-weight: 800; padding: 2px 6px; border-radius: 4px; color: #fff; text-transform: uppercase; flex-shrink: 0; }
        
        .v-info { 
            font-size: 0.65rem; 
            color: #9ca3af; 
            font-family: monospace; 
            word-break: break-all;
            text-align: center;
            width: 100%;
        }

        .dl-group { 
            display: flex; 
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px; 
        }
        
        .dl-btn {
            min-width: 60px;
            max-width: 100%;
            text-align: center; text-decoration: none; 
            font-size: 0.7rem; font-weight: 600;
            padding: 6px 12px; border-radius: 6px;
            background: #f3f4f6; color: var(--text-main);
            transition: all 0.2s;
            word-break: break-all;
        }
        .dl-btn:hover { background: var(--primary); color: #fff; }

        .bg-win { background: var(--win); } .bg-mac { background: var(--mac); }
        .bg-lin { background: var(--lin); } .bg-and { background: var(--and); } .bg-ios { background: var(--ios); }

        .hidden { display: none !important; }
        #no-results { text-align: center; padding: 40px; color: var(--text-sub); font-size: 0.85rem; width: 100%; }

        @media (max-width: 450px) {
            .header-inner { flex-direction: column; align-items: stretch; }
            .controls { justify-content: center; width: 100%; }
            #platform-filter, #search-input { flex: 1 1 100%; max-width: none; }
            .grid { column-count: 1; }
        }
    </style>
</head>
<body>

<header class="header">
    <div class="header-inner">
        <div class="logo-text">APP.2024-10-24.ZIP</div>
        <div class="controls">
            <select id="platform-filter">
                <option value="all">所有平台</option>
                <option value="windows">Windows</option>
                <option value="android">Android</option>
                <option value="macos">macOS</option>
                <option value="linux">Linux</option>
                <option value="ios">iOS</option>
            </select>
            <input type="text" id="search-input" placeholder="搜索关键字..">
        </div>
    </div>
</header>

<div class="container">
    <div id="grid" class="grid"></div>
    <div id="no-results" class="hidden">未找到相关条目</div>
</div>

<script>
    let appData = [];
    const LIMIT = 40;
    const states = new Map();

    async function init() {
        try {
            const params = new URLSearchParams(window.location.search);
            if (params.has('search')) document.getElementById('search-input').value = params.get('search');
            if (params.has('platform')) document.getElementById('platform-filter').value = params.get('platform');
            
            const res = await fetch('data.json');
            appData = await res.json();
            render();
            runFilter();
        } catch (e) {
            document.getElementById('grid').innerHTML = "Database error.";
        }
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = appData.map((app, i) => {
            states.set(i, false);
            return `
                <div class="card" data-idx="${i}">
                    <div class="card-header">
                        <div class="img-wrapper">
                            <img src="${app.logo}" alt="${app.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/56/f3f4f6/9ca3af?text=NA'">
                        </div>
                        <h2 class="name">${app.name}</h2>
                    </div>
                    <div class="desc-box" onclick="toggleText(${i})" id="desc-${i}">
                        ${formatDesc(app.description, i)}
                    </div>
                    <div class="platforms">
                        ${renderPlatforms(app.platforms)}
                    </div>
                    <div class="source-container">
                        ${renderSources(app.source)}
                    </div>
                </div>
            `;
        }).join('');
    }

    function renderSources(source) {
        if (!source) return '';
        const sources = Array.isArray(source) ? source : [source];
        return sources.map(url => `
            <a href="${url}" class="source-link" target="_blank">
                ${url.includes('github.com') ? 
                    `<svg height="14" width="14" viewBox="0 0 16 16"><path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>` : 
                    `<svg height="14" width="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>`
                }
            </a>
        `).join('');
    }

    function formatDesc(text, i) {
        if (text.length <= LIMIT) return text;
        return text.substring(0, LIMIT) + "...";
    }

    window.toggleText = function(i) {
        const box = document.getElementById(`desc-${i}`);
        const isExpanded = states.get(i);
        const fullText = appData[i].description;
        if (fullText.length <= LIMIT) return;
        if (isExpanded) {
            box.innerText = fullText.substring(0, LIMIT) + "...";
            states.set(i, false);
        } else {
            box.innerText = fullText;
            states.set(i, true);
        }
    }

    function renderPlatforms(p) {
        if (!p) return '';
        const config = {
            windows: { label: 'Windows', cls: 'bg-win' },
            macos: { label: 'macOS', cls: 'bg-mac' },
            linux: { label: 'Linux', cls: 'bg-lin' },
            android: { label: 'Android', cls: 'bg-and' },
            ios: { label: 'iOS', cls: 'bg-ios' }
        };

        return Object.entries(config).map(([key, cfg]) => {
            const info = p[key];
            if (!info || info === 'none') return '';
            const hasLinks = info.links && Object.keys(info.links).length > 0;
            if (!hasLinks) return '';
            const hasVersions = Array.isArray(info.supported_versions) && info.supported_versions.length > 0;

            return `
                <div class="p-row">
                    <div class="p-header">
                        <span class="p-badge ${cfg.cls}">${cfg.label}</span>
                        ${hasVersions ? `<span class="v-info">${info.supported_versions.join('|')}</span>` : ''}
                    </div>
                    <div class="dl-group">
                        ${Object.entries(info.links).map(([arch, url]) => `
                            <a href="${url}" class="dl-btn" target="_blank">${arch.toUpperCase()}</a>
                        `).join('')}
                    </div>
                </div>
            `;
        }).join('');
    }

    function runFilter() {
        const q = document.getElementById('search-input').value.toLowerCase().trim();
        const pFilter = document.getElementById('platform-filter').value;
        let count = 0;

        document.querySelectorAll('.card').forEach(card => {
            const i = card.dataset.idx;
            const app = appData[i];
            const matchSearch = app.name.toLowerCase().includes(q) || app.description.toLowerCase().includes(q);
            let matchPlatform = true;
            if (pFilter !== 'all') {
                const info = app.platforms[pFilter];
                matchPlatform = info && info !== 'none' && info.links && Object.keys(info.links).length > 0;
            }
            const isVisible = matchSearch && matchPlatform;
            card.classList.toggle('hidden', !isVisible);
            if(isVisible) count++;
        });
        document.getElementById('no-results').classList.toggle('hidden', count > 0);

        const url = new URL(window.location);
        if (q) url.searchParams.set('search', q); else url.searchParams.delete('search');
        if (pFilter !== 'all') url.searchParams.set('platform', pFilter); else url.searchParams.delete('platform');
        window.history.replaceState({}, '', url); 
    }

    document.getElementById('search-input').addEventListener('input', runFilter);
    document.getElementById('platform-filter').addEventListener('change', runFilter);

    init();
</script>
</body>
</html>
